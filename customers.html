<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة العملاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #f4f7fc; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        .header h1 { color: #b45309; display: flex; align-items: center; gap: 12px; }
        .btn-back {
            background: #b45309;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { background: #92400e; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: end;
        }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; color: #334155; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
        }
        .form-group input:focus { outline: 2px solid #b45309; border-color: transparent; }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-primary { background: #b45309; color: white; }
        .btn-primary:hover { background: #92400e; transform: scale(1.02); }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 6px 16px; font-size: 0.85rem; }
        .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid #eef2f6; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f1f5f9; padding: 14px; text-align: center; font-weight: 600; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eef2f6; }
        .empty-state { padding: 40px; text-align: center; color: #94a3b8; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        @media (max-width: 600px) { .header { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-users"></i> إدارة العملاء</h1>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-user-plus"></i> إضافة / حذف عميل</h3>
        <div class="form-grid" id="customerForm">
            <div class="form-group">
                <label>اسم العميل</label>
                <input type="text" id="custName" placeholder="مثال: أحمد علي" />
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="text" id="custPhone" placeholder="٠١٠٠٠٠٠٠٠" />
            </div>
            <div class="form-group" style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-primary" id="addCustomerBtn"><i class="fas fa-plus-circle"></i> إضافة</button>
                <button class="btn btn-danger" id="deleteCustomerBtn"><i class="fas fa-trash-alt"></i> حذف</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-list"></i> قائمة العملاء</h3>
        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>تاريخ الإضافة</th><th>الوقت</th></tr></thead>
                <tbody id="customersTableBody"><tr><td colspan="5" class="empty-state">لا يوجد عملاء</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script>
    const SUPABASE_URL = "https://rmruhmstxzeeoqthrneg.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcnVobXN0eHplZW9xdGhybmVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgzNDYsImV4cCI6MjA5MzMyNDM0Nn0.WCMyEXEJwj-4TvqJi_UDN5w2uxrAf-ZYljWQthgR4Hg";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function nowISO() { return new Date().toISOString(); }
    function formatDate(iso) { if(!iso) return '-'; const d=new Date(iso); return d.toLocaleDateString('ar-EG'); }
    function formatTime(iso) { if(!iso) return '-'; const d=new Date(iso); return d.toLocaleTimeString('ar-EG', {hour:'2-digit',minute:'2-digit'}); }

    async function loadCustomers() {
        const { data, error } = await supabase.from('customers').select('*').order('created_at', {ascending:false});
        if(error) { console.error(error); return []; }
        return data || [];
    }

    async function renderCustomers() {
        const data = await loadCustomers();
        const tbody = document.getElementById('customersTableBody');
        if(!data.length) { tbody.innerHTML='<tr><td colspan="5" class="empty-state">لا يوجد عملاء</td></tr>'; return; }
        tbody.innerHTML = data.map((c,i) => `
            <tr>
                <td>${i+1}</td>
                <td><strong>${c.name||''}</strong></td>
                <td>${c.phone||''}</td>
                <td>${formatDate(c.created_at)}</td>
                <td>${formatTime(c.created_at)}</td>
            </tr>
        `).join('');
    }

    document.getElementById('addCustomerBtn').addEventListener('click', async function() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        if(!name) { alert('أدخل اسم العميل'); return; }
        const { error } = await supabase.from('customers').insert([{ name, phone, created_at: nowISO() }]);
        if(error) { alert('خطأ: '+error.message); return; }
        document.getElementById('custName').value=''; document.getElementById('custPhone').value='';
        renderCustomers();
    });

    document.getElementById('deleteCustomerBtn').addEventListener('click', async function() {
        const name = document.getElementById('custName').value.trim();
        if(!name) { alert('أدخل اسم العميل المراد حذفه'); return; }
        if(!confirm(`تأكيد حذف العميل "${name}"؟`)) return;
        const { error } = await supabase.from('customers').delete().eq('name', name);
        if(error) { alert('خطأ: '+error.message); return; }
        document.getElementById('custName').value=''; document.getElementById('custPhone').value='';
        renderCustomers();
    });

    renderCustomers();
</script>
</body>
</html>
