<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جميع المديونيات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #f4f7fc; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        .header h1 { color: #b45309; display: flex; align-items: center; gap: 12px; }
        .btn-back {
            background: #b45309;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { background: #92400e; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid #eef2f6; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f1f5f9; padding: 14px; text-align: center; font-weight: 600; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eef2f6; }
        .empty-state { padding: 40px; text-align: center; color: #94a3b8; }
        .badge-success { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .badge-danger { background: #fee2e2; color: #991b1b; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
        }
        @media (max-width: 600px) { .header { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-file-invoice"></i> جميع المديونيات</h1>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    </div>

    <div class="card">
        <div class="filter-bar">
            <select id="filterStatus">
                <option value="all">جميع المديونيات</option>
                <option value="open">مفتوحة</option>
                <option value="paid">مسددة</option>
            </select>
            <input type="text" id="searchCustomer" placeholder="بحث باسم العميل" />
            <button class="btn btn-primary" id="applyFilter" style="background:#b45309;color:white;border:none;padding:8px 20px;border-radius:40px;cursor:pointer;">تصفية</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>العميل</th><th>المبلغ</th><th>الملاحظات</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th></tr></thead>
                <tbody id="allDebtsTableBody"><tr><td colspan="7" class="empty-state">لا توجد مديونيات</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script>
    const SUPABASE_URL = "https://rmruhmstxzeeoqthrneg.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtcnVobXN0eHplZW9xdGhybmVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgzNDYsImV4cCI6MjA5MzMyNDM0Nn0.WCMyEXEJwj-4TvqJi_UDN5w2uxrAf-ZYljWQthgR4Hg";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function formatDate(iso) { if(!iso) return '-'; const d=new Date(iso); return d.toLocaleDateString('ar-EG'); }
    function formatTime(iso) { if(!iso) return '-'; const d=new Date(iso); return d.toLocaleTimeString('ar-EG', {hour:'2-digit',minute:'2-digit'}); }

    async function loadAllDebts(filter='all', search='') {
        let query = supabase.from('debts').select('*, customers(name)').order('created_at', {ascending:false});
        if(filter !== 'all') query = query.eq('status', filter);
        const { data, error } = await query;
        if(error) return [];
        let result = data || [];
        if(search) {
            result = result.filter(d => d.customers?.name?.toLowerCase().includes(search.toLowerCase()));
        }
        return result;
    }

    async function renderAllDebts(filter='all', search='') {
        const data = await loadAllDebts(filter, search);
        const tbody = document.getElementById('allDebtsTableBody');
        if(!data.length) { tbody.innerHTML='<tr><td colspan="7" class="empty-state">لا توجد مديونيات</td></tr>'; return; }
        tbody.innerHTML = data.map((d,i) => `
            <tr>
                <td>${i+1}</td>
                <td><strong>${d.customers?.name || 'غير معروف'}</strong></td>
                <td>${d.amount || 0} ج.م</td>
                <td>${d.note || ''}</td>
                <td>${formatDate(d.created_at)}</td>
                <td>${formatTime(d.created_at)}</td>
                <td><span class="${d.status === 'paid' ? 'badge-success' : 'badge-danger'}">${d.status === 'paid' ? 'مسددة' : 'مفتوحة'}</span></td>
            </tr>
        `).join('');
    }

    document.getElementById('applyFilter').addEventListener('click', function() {
        const filter = document.getElementById('filterStatus').value;
        const search = document.getElementById('searchCustomer').value.trim();
        renderAllDebts(filter, search);
    });

    // Initial load
    renderAllDebts();
</script>
</body>
</html>
